<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A modern Python quiz application with smooth animations and professional design">
    <title>Python Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <main class="quiz-container glass-panel" role="main" aria-label="Quiz Application">

        <!-- Start Screen -->
        <!-- Start Screen -->
<section id="start-screen" class="screen active dashboard">

    <div class="dashboard-left">
        <h1>Python Quiz</h1>
        <p>
            Test your Python knowledge with a 30-question challenge.
            Improve your skills and track your progress over time.
        </p>

        <button id="start-btn" class="primary-btn">
            Start Quiz
        </button>
    </div>

    <div class="dashboard-right">

        <h3>📊 Your Progress</h3>

        <div class="stats-card">
            <div class="stat">
                <span class="label">Best Score</span>
                <span class="value" id="best-score">--</span>
            </div>

            <div class="stat">
                <span class="label">Last Score</span>
                <span class="value" id="last-score">--</span>
            </div>

            <div class="stat">
                <span class="label">Attempts</span>
                <span class="value" id="attempt-count">0</span>
            </div>
        </div>

        <div class="history-box">
            <h4>Recent Attempts</h4>
            <ul id="history-list">
                <!-- JS will fill this -->
            </ul>
        </div>

    </div>

</section>
        <!-- Quiz Screen -->
        <section id="quiz-screen" class="screen hidden" aria-live="polite" aria-busy="false">
            <header class="header">
                <div class="progress-container" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                    <div id="progress-bar"></div>
                </div>
                <div class="info-row">
                    <span id="question-count" aria-label="Current question">Question: 1 / 30</span>
                    <span id="timer" aria-label="Elapsed time">Time: 00:00</span>
                </div>
            </header>

            <article class="question-container">
                <h2 id="question-text">Loading question...</h2>
                <div id="options-container" class="options-grid" role="group" aria-label="Answer options">
                    <!-- Options will be injected here via JavaScript -->
                </div>
            </article>

            <div class="controls">
                <button id="prev-btn" class="secondary-btn" disabled aria-label="Go to previous question">← Previous</button>
                <button id="next-btn" class="primary-btn" aria-label="Go to next question or submit">Next →</button>
            </div>
        </section>

        <!-- Result Screen -->
        <section id="result-screen" class="screen hidden" aria-live="assertive">
            <h1 id="result-message">Great Job!</h1>

            <div class="score-card">
                <div class="score-circle" role="img" aria-label="Your score">
                    <span id="score-percentage">0%</span>
                </div>
                <p id="score-text">You scored 0 out of 30.</p>
            </div>

            <button id="restart-btn" class="primary-btn mt-2" aria-label="Restart the quiz">Restart Quiz</button>
        </section>

    </main>

    <script src="{{ url_for('static', filename='script.js') }}" defer></script>
</body>

</html>
